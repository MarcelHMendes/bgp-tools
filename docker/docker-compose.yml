version: '3.3'

services:
  bgpmonitor-dump:
    container_name: peering_bgpmonitor
    build: ./bgpdownloader
    volumes:
      - ./bgpdownloader/data:/usr/src/app/data
      - ./config.json:/usr/src/app/config.json
  ripemonitor-dump:
    container_name: peering_ripemonitor
    build: ./ripedownloader
    volumes:
      - ./ripedownloader/data:/usr/source/app/data/
      - ./config.json:/usr/source/app/config.json
    cap_drop:
      - SYS_ADMIN
      - SETUID
      - SETGID
      - CHOWN
      - FOWNER

  peeringrov-dataprocessing:
    container_name: peering_dataprocessing
    build: ./dataprocessing
    volumes:
      - ./ripedownloader/data/:/usr/source/app/ripedata/data/
      - ./dataprocessing/data/:/usr/source/app/data/
      - ./config.json:/usr/source/app/config.json
