version: '3.3'

services:
  bgpmonitor-dump:
    container_name: peering_bgpmonitor
    build: ./bgpdownloader
    volumes:
      - ./data:/var/monitor/data
      - ./config.json:/usr/source/app/config.json
  ripemonitor-dump:
    container_name: peering_ripemonitor
    build: ./ripedownloader
    volumes:
      - ./data:/var/monitor/data
      - ./config.json:/usr/source/app/config.json
    cap_drop:
      - SYS_ADMIN
      - SETUID
      - SETGID
      - CHOWN
      - FOWNER

  peeringrov-dataprocessing:
    container_name: peering_dataprocessing
    build: ./dataprocessing
    volumes:
      - ./data/:/var/monitor/data
      - ./config.json:/usr/source/app/config.json
